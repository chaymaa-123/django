{% extends "main.html" %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Formulaire Location de Voiture</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --marine-blue: #03084b;
      --yellow-gold: rgb(243, 220, 130);
    }
    body {
      background-color: var(--marine-blue);
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      font-weight: bold;
      color: var(--white);
      overflow-x: hidden;
    }
    .horizontal-search-body {
      background-color: var(--marine-blue);
      border: 2px solid var(--yellow-gold);
      border-radius: 12px;
      max-width: 800px;
      margin: 7rem auto 2rem;
      padding: 2rem;
      box-shadow: 0 0 20px rgba(240, 6, 6, 0.1);
    }
    .inspect-filter-widget-title {
      color: var(--yellow-gold);
      margin-bottom: 0.5rem;
      font-size: 1.2rem;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 0.6rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      border: 2px solid var(--yellow-gold);
      font-weight: bold;
      color: #000000;
      background-color: #ffffff;
    }
    .submit-search {
      background-color: var(--yellow-gold);
      color: var(--marine-blue);
      padding: 0.8rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
      width: 100%;
    }
    .submit-search:hover {
      background-color: rgb(255, 231, 95);
    }
    .daterangepicker {
      z-index: 9999 !important;
      font-size: 0.9rem;
    }
    .video-card {
      max-width: 800px;
      margin: 2rem auto;
      border: 2px solid var(--yellow-gold);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(240, 15, 15, 0.1);
    }
    .video-card video {
      width: 100%;
      display: block;
    }
    .video-title {
      background-color: var(--yellow-gold);
      color: var(--marine-blue);
      text-align: center;
      font-size: 1.3rem;
      padding: 0.8rem;
      font-weight: bold;
    }
    .date-field-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .date-field-wrapper i {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      text-align: center;
      color: #000000;
      pointer-events: none;
    }
    .date-field-wrapper input {
      padding-left: 2.5rem;
    }
    .alert {
  padding: 1em;
  margin-bottom: 1em;
  border-radius: 5px;
}
.alert-error {
  background-color: #f8d7da;
  color: #842029;
}
.alert-success {
  background-color: #d1e7dd;
  color: #0f5132;
}

  </style>
</head>
<body>

<div class="horizontal-search-body">
  <form method="post" action="{% url 'contactus' %}">
    {% csrf_token %}

    <!-- Lieu de départ -->
    <div class="inspect-filter-widget">
      <h2 class="inspect-filter-widget-title">Où es-tu ?</h2>
      <select name="pickup_location">
        <option value="">Sélectionne un lieu de départ</option>
        <option value="casablanca">Casablanca</option>
        <option value="mohammed-v-international-airport">Aéroport Mohammed V</option>
        <option value="rabat-sale-airport">Aéroport Rabat-Salé</option>
      </select>
    </div>

    <!-- Lieu d’arrivée -->
    <div class="inspect-filter-widget">
      <h2 class="inspect-filter-widget-title">Où vas-tu ?</h2>
      <select name="dropoff_location">
        <option value="">Sélectionne un lieu d’arrivée</option>
        <option value="casablanca">Casablanca</option>
        <option value="mohammed-v-international-airport">Aéroport Mohammed V</option>
        <option value="rabat-sale-airport">Aéroport Rabat-Salé</option>
      </select>
    </div>

    <!-- Voiture -->
    <div class="inspect-filter-widget">
      <h2 class="inspect-filter-widget-title">Voiture</h2>
      <select name="modele_voiture">
        <option value="">Sélectionne une voiture</option>
        {% for voiture in voitures %}
          <option value="{{ voiture.modele }}">{{ voiture.modele }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Date de location -->
    <div class="inspect-filter-widget">
      <h2 class="inspect-filter-widget-title">Date de location</h2>
      <div class="date-field-wrapper">
        <i class="fa-solid fa-calendar-days" style="font-size: 20px;"></i>
        <input type="text" name="datelocation" id="datelocation" placeholder="XXXX-XX-XX" readonly />
      </div>
    </div>

    <input type="submit" class="submit-search" value="Rechercher">
  </form>
</div>

<div class="video-card">
  <div class="video-title">Louez votre voiture de rêve dès maintenant !</div>
  <iframe width="800" height="450"
    src="https://www.youtube.com/embed/dJrlTtC1xGQ"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>



<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment@2.29.1/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
<script>
  $(function () {
    $('#datelocation').daterangepicker({
      opens: 'center',
      drops: 'down',
      autoUpdateInput: false,
      locale: {
        format: 'DD-MM-YYYY',
        applyLabel: 'Appliquer',
        cancelLabel: 'Annuler',
        daysOfWeek: ['Di', 'Lu', 'Ma', 'Me', 'Je', 'Ve', 'Sa'],
        monthNames: ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin',
          'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'],
        firstDay: 1
      }
    });

    $('#datelocation').on('apply.daterangepicker', function (ev, picker) {
      $(this).val(picker.startDate.format('DD-MM-YYYY') + ' - ' + picker.endDate.format('DD-MM-YYYY'));
    });

    $('#datelocation').on('cancel.daterangepicker', function () {
      $(this).val('');
    });
  });

</script>
...
<script src="..."></script>

{% if messages %}
  <script>
    {% for message in messages %}
      alert("{{ message|escapejs }}");
    {% endfor %}
  </script>
{% endif %}
</body>
</html>

</body>
</html>
{% endblock %}
